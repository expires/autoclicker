name: Build and Release

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        mapping: [fabric_1.21.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME="$env:JAVA_HOME" -DMAPPING_VERSION="${{ matrix.mapping }}"

      - name: Inject Config.h
        shell: bash
        run: |
          {
            echo '#pragma once'
            echo '#define DISCORD_WEBHOOK_HOST  L"discord.com"'
            echo '#define DISCORD_WEBHOOK_PATH  L"${{ secrets.DISCORD_WEBHOOK_PATH }}"'
            echo '#define GITHUB_BANNED_HOST    L"raw.githubusercontent.com"'
            echo '#define GITHUB_BANNED_PATH    L"${{ secrets.BANNED_PATH }}"'
          } > build/DLL/config/Config.h

      - name: Restore cached injector
        id: injcache
        uses: actions/cache@v4
        with:
          path: build/INJECTOR/Release/INJECTOR.exe
          key: injector-${{ runner.os }}-${{ hashFiles('injector/**', 'CMakeLists.txt') }}

      - name: Build DLL
        run: cmake --build build --config Release --target DLL

      - name: Build injector (only when its source changed)
        if: steps.injcache.outputs.cache-hit != 'true'
        run: cmake --build build --config Release --target INJECTOR

      - name: Stage artifacts
        run: |
          mkdir release
          copy build\DLL\Release\DLL.dll release\ac.dll
          copy build\INJECTOR\Release\INJECTOR.exe release\injector.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-${{ matrix.mapping }}
          path: release\

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Rename DLLs for release
        run: |
          rename release\autoclicker-fabric_1.21.11\ac.dll ac_fabric_1.21.11.dll

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
          token: ${{ secrets.GITHUB_TOKEN }}

  # Rolling release for the injector to fetch. Each push to main replaces the
  # assets on the 'latest' tag so injector.exe's hardcoded URL
  #   github.com/expires/autoclicker/releases/latest/download/ac.dll
  # always points at the freshest DLL.
  release-rolling:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: autoclicker-fabric_1.21.11
          path: ./rolling

      - name: Resolve assets to publish
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new=$(sha256sum ./rolling/injector.exe | awk '{print $1}')
          old=""
          if gh release download latest -R "${{ github.repository }}" -p injector.exe -D ./current 2>/dev/null; then
            old=$(sha256sum ./current/injector.exe | awk '{print $1}')
          fi
          {
            echo 'files<<EOF'
            echo './rolling/ac.dll'
            if [ "$new" != "$old" ]; then echo './rolling/injector.exe'; fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          if [ "$new" = "$old" ]; then
            echo "injector unchanged ($new) - skipping re-upload"
          else
            echo "injector changed (old='$old' new='$new') - will upload"
          fi

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest (auto)"
          body: "Auto-built from main @ ${{ github.sha }}"
          prerelease: true
          files: ${{ steps.assets.outputs.files }}
          token: ${{ secrets.GITHUB_TOKEN }}
