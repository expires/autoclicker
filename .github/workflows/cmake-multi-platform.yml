name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        mapping: [mojang_1.21.4, fabric_1.21.11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME="$env:JAVA_HOME" -DMAPPING_VERSION="${{ matrix.mapping }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifacts
        run: |
          mkdir release
          copy build\DLL\Release\DLL.dll release\ac.dll
          copy build\INJECTOR\Release\INJECTOR.exe release\injector.exe
          copy ac_config.json release\ac_config.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-${{ matrix.mapping }}
          path: release\

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
