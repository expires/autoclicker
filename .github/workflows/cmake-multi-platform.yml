name: Build and Release

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      MNC_RELEASE_TAG: ${{ github.ref == 'refs/heads/development' && 'dev' || 'release' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - mapping: fabric_1.21.11
            asset: mnc_1.21.11.dll
          - mapping: lunar_1.8.9
            asset: mnc_1.8.9.dll
          - mapping: 1.26.x+
            asset: mnc_1.26.x+.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME="$env:JAVA_HOME" -DMAPPING_VERSION="${{ matrix.mapping }}" -DMNC_RELEASE_TAG="${{ env.MNC_RELEASE_TAG }}"

      - name: Inject Config.h
        shell: bash
        run: |
          {
            echo '#pragma once'
            echo '#define DISCORD_WEBHOOK_HOST  L"discord.com"'
            echo '#define DISCORD_WEBHOOK_PATH  L"${{ secrets.DISCORD_WEBHOOK_PATH }}"'
            echo '#define GITHUB_BANNED_HOST    L"raw.githubusercontent.com"'
            echo '#define GITHUB_BANNED_PATH    L"${{ secrets.BANNED_PATH }}"'
          } > build/DLL/config/Config.h

      - name: Restore cached injector
        id: injcache
        uses: actions/cache@v4
        with:
          path: build/INJECTOR/Release/mnc.exe
          key: injector-${{ runner.os }}-${{ env.MNC_RELEASE_TAG }}-${{ hashFiles('injector/**', 'CMakeLists.txt') }}

      - name: Build DLL
        run: cmake --build build --config Release --target DLL

      - name: Build injector (only when its source changed)
        if: steps.injcache.outputs.cache-hit != 'true'
        run: cmake --build build --config Release --target INJECTOR

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p release
          cp build/DLL/Release/DLL.dll "release/${{ matrix.asset }}"
          cp build/INJECTOR/Release/mnc.exe release/mnc.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-${{ matrix.mapping }}
          path: release\

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Assemble release assets
        run: |
          mkdir -p release
          cp dl/autoclicker-fabric_1.21.11/mnc_1.21.11.dll  release/mnc_1.21.11.dll
          cp dl/autoclicker-lunar_1.8.9/mnc_1.8.9.dll       release/mnc_1.8.9.dll
          cp dl/autoclicker-1.26.x+/mnc_1.26.x+.dll         release/mnc_1.26.x+.dll
          cp dl/autoclicker-fabric_1.21.11/mnc.exe    release/mnc.exe
          cp versions.txt                                  release/versions.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}

  release-rolling:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Assemble rolling assets
        run: |
          mkdir -p rolling
          cp dl/autoclicker-fabric_1.21.11/mnc_1.21.11.dll  rolling/mnc_1.21.11.dll
          cp dl/autoclicker-lunar_1.8.9/mnc_1.8.9.dll       rolling/mnc_1.8.9.dll
          cp dl/autoclicker-1.26.x+/mnc_1.26.x+.dll         rolling/mnc_1.26.x+.dll
          cp dl/autoclicker-fabric_1.21.11/mnc.exe    rolling/mnc.exe
          cp versions.txt                                  rolling/versions.txt

      - name: Resolve assets to publish
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new=$(sha256sum ./rolling/mnc.exe | awk '{print $1}')
          old=""
          if gh release download release -R "${{ github.repository }}" -p mnc.exe -D ./current 2>/dev/null; then
            old=$(sha256sum ./current/mnc.exe | awk '{print $1}')
          fi
          {
            echo 'files<<EOF'
            echo './rolling/mnc_1.21.11.dll'
            echo './rolling/mnc_1.8.9.dll'
            echo './rolling/mnc_1.26.x+.dll'
            echo './rolling/versions.txt'
            if [ "$new" != "$old" ]; then echo './rolling/mnc.exe'; fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          if [ "$new" = "$old" ]; then
            echo "injector unchanged ($new) - skipping re-upload"
          else
            echo "injector changed (old='$old' new='$new') - will upload"
          fi

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release
          name: "Release (auto)"
          body: |
            auto-built from `main` @ ${{ github.sha }}

            ### How to use
            Download **only `mnc.exe`** below — you do **not** need the `.dll` files. The injector auto-detects your Minecraft version and pulls the matching DLL itself.

            1. Launch Lunar Client and join a world or server.
            2. Run `mnc.exe`.
          prerelease: false
          make_latest: true
          files: ${{ steps.assets.outputs.files }}
          token: ${{ secrets.GITHUB_TOKEN }}

  release-rolling-dev:
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl

      - name: Assemble rolling assets
        run: |
          mkdir -p rolling
          cp dl/autoclicker-fabric_1.21.11/mnc_1.21.11.dll  rolling/mnc_1.21.11.dll
          cp dl/autoclicker-lunar_1.8.9/mnc_1.8.9.dll       rolling/mnc_1.8.9.dll
          cp dl/autoclicker-1.26.x+/mnc_1.26.x+.dll         rolling/mnc_1.26.x+.dll
          cp dl/autoclicker-fabric_1.21.11/mnc.exe    rolling/mnc.exe
          cp versions.txt                                  rolling/versions.txt

      - name: Resolve assets to publish
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new=$(sha256sum ./rolling/mnc.exe | awk '{print $1}')
          old=""
          if gh release download dev -R "${{ github.repository }}" -p mnc.exe -D ./current 2>/dev/null; then
            old=$(sha256sum ./current/mnc.exe | awk '{print $1}')
          fi
          {
            echo 'files<<EOF'
            echo './rolling/mnc_1.21.11.dll'
            echo './rolling/mnc_1.8.9.dll'
            echo './rolling/mnc_1.26.x+.dll'
            echo './rolling/versions.txt'
            if [ "$new" != "$old" ]; then echo './rolling/mnc.exe'; fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          if [ "$new" = "$old" ]; then
            echo "injector unchanged ($new) - skipping re-upload"
          else
            echo "injector changed (old='$old' new='$new') - will upload"
          fi

      - name: Publish rolling dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Dev (auto)"
          body: "Auto-built from development @ ${{ github.sha }}"
          prerelease: true
          files: ${{ steps.assets.outputs.files }}
          token: ${{ secrets.GITHUB_TOKEN }}
