name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Create Config.h
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $path = Join-Path $env:GITHUB_WORKSPACE "dll" "Config.h"
          $lines = @(
            '#pragma once',
            '#define DISCORD_WEBHOOK_HOST  L"discord.com"',
            '#define DISCORD_WEBHOOK_PATH  L"${{ secrets.DISCORD_WEBHOOK_PATH }}"',
            '#define GITHUB_BANNED_HOST    L"raw.githubusercontent.com"',
            '#define GITHUB_BANNED_PATH    L"${{ secrets.BANNED_PATH }}"'
          )
          [System.IO.File]::WriteAllLines($path, $lines, [System.Text.Encoding]::UTF8)
          if (-not (Test-Path $path)) { throw "Config.h was not created" }
          Write-Host "Config.h written to $path"

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME="$env:JAVA_HOME"

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifacts
        run: |
          mkdir release
          copy build\DLL\Release\DLL.dll release\ac.dll
          copy build\INJECTOR\Release\INJECTOR.exe release\injector.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker
          path: release\

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ac.dll
            release/injector.exe
