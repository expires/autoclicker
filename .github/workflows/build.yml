name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJAVA_HOME="$env:JAVA_HOME"

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifacts
        run: |
          mkdir release
          copy build\DLL\Release\DLL.dll release\ac.dll
          copy build\INJECTOR\Release\INJECTOR.exe release\injector.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker
          path: release\

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ac.dll
            release/injector.exe
